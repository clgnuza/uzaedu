<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <title>Toplu özürsüz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../gate/gate.css" />
    <link rel="stylesheet" href="kelebek.css" />
  </head>
  <body class="uza-body">
    <main class="card uza-page">
      <a href="../app/app.html" class="back-link">← Modüller</a>
      <h1>Toplu özürsüz giriş</h1>
      <p class="gate-sub">Okul numaralarını türe göre OkulNet günlük listesine işler.</p>
      <label class="gate-sub" for="tozTarih">Tarih</label>
      <input id="tozTarih" type="date" class="btn-primary" style="width: 100%; margin-bottom: 0.75rem" />
      <label class="gate-sub" for="tozTam">Tam gün — numaralar</label>
      <textarea id="tozTam" rows="3" style="width: 100%; margin-bottom: 0.5rem"></textarea>
      <div id="tozIlk">
        <label class="gate-sub" for="tozYarim">Yarım gün</label>
        <textarea id="tozYarim" rows="2" style="width: 100%; margin-bottom: 0.5rem"></textarea>
      </div>
      <div id="tozOrta" hidden>
        <label class="gate-sub" for="tozSabah">Sabahtan yarım</label>
        <textarea id="tozSabah" rows="2" style="width: 100%; margin-bottom: 0.5rem"></textarea>
        <label class="gate-sub" for="tozOglen">Öğleden yarım</label>
        <textarea id="tozOglen" rows="2" style="width: 100%; margin-bottom: 0.5rem"></textarea>
        <label class="gate-sub" for="tozNobet">Nöbetçi</label>
        <textarea id="tozNobet" rows="2" style="width: 100%; margin-bottom: 0.5rem"></textarea>
      </div>
      <label class="gate-sub" for="tozGec">Geç</label>
      <textarea id="tozGec" rows="2" style="width: 100%; margin-bottom: 0.75rem"></textarea>
      <button type="button" id="btnToz" class="btn-primary" style="width: 100%">OkulNet&apos;e yaz</button>
      <p id="status" class="gate-message"></p>
    </main>
    <script src="../shared/brand-names.js"></script>
    <script src="../shared/messaging.js"></script>
    <script src="toplu-ozursuz.js"></script>
  </body>
</html>
