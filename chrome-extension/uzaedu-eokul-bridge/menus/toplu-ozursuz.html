<!DOCTYPE html>
<html lang="tr">
  <head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Toplu özürsüz</title>
    <link rel="stylesheet" href="kelebek.css" />
    <link rel="stylesheet" href="../shared/embed.css" />
  </head>
  <body class="uza-body" data-uza-platform="eokul" data-uza-icon="activity" data-uza-title="Toplu özürsüz" data-uza-lead="Toplu özürsüz devamsızlık girişi.">
    <main class="card uza-page">
      <a href="../app/app.html" class="back-link">‹ Modüller</a>
      <h1>Toplu özürsüz giriş</h1>
      <p class="gate-sub">Okul numaralarını türe göre e-Okul günlük listesine işler.</p>
      <label class="gate-sub" for="tozTarih">Tarih</label>
      <input id="tozTarih" type="date" class="uza-input uza-w-full uza-mb-075" />
      <label class="gate-sub" for="tozTam">Tam gün — numaralar</label>
      <textarea id="tozTam" rows="3" class="uza-input uza-w-full uza-mb-05"></textarea>
      <div id="tozIlk">
        <label class="gate-sub" for="tozYarim">Yarım gün</label>
        <textarea id="tozYarim" rows="2" class="uza-input uza-w-full uza-mb-05"></textarea>
      </div>
      <div id="tozOrta" hidden>
        <label class="gate-sub" for="tozSabah">Sabahtan yarım</label>
        <textarea id="tozSabah" rows="2" class="uza-input uza-w-full uza-mb-05"></textarea>
        <label class="gate-sub" for="tozOglen">Öğleden yarım</label>
        <textarea id="tozOglen" rows="2" class="uza-input uza-w-full uza-mb-05"></textarea>
        <label class="gate-sub" for="tozNobet">Nöbetçi</label>
        <textarea id="tozNobet" rows="2" class="uza-input uza-w-full uza-mb-05"></textarea>
      </div>
      <label class="gate-sub" for="tozGec">Geç</label>
      <textarea id="tozGec" rows="2" class="uza-input uza-w-full uza-mb-075"></textarea>
      <button type="button" id="btnToz" class="btn-primary uza-w-full">e-Okul&apos;e yaz</button>
      <p id="status" class="gate-message"></p>
    </main>
  <script src="../shared/brand-names.js"></script>
  <script src="../shared/embed.js"></script>
  <script src="../shared/icons.js"></script>
  <script src="../shared/notify.js"></script>
  <script src="../shared/menu-chrome.js"></script>
<script src="../shared/messaging.js"></script>
    <script src="toplu-ozursuz.js"></script>
  </body>
</html>
