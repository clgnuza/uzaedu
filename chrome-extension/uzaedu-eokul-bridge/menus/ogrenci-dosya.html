<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#070b14" />
    <title>Öğrenci dosya — Uzaedu Okul Köprüsü</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../gate/gate.css" />
    <link rel="stylesheet" href="kelebek.css" />
  </head>
  <body class="uza-body">
    <main class="card uza-page">
      <header>
        <a href="../app/app.html" class="back-link">← Modüller</a>
        <h1>Öğrenci dosya bilgileri</h1>
        <p class="gate-sub">Grup ve alan seçerek CSV/ZIP indirir; isteğe bağlı panele aktarır.</p>
      </header>
      <label class="gate-field">
        <span>Grup</span>
        <select id="groupId" class="gate-input"></select>
      </label>
      <div id="fieldBox" class="kb-actions" hidden>
        <p class="gate-sub" style="margin: 0 0 0.5rem">Alanlar</p>
        <div id="fieldList"></div>
      </div>
      <label class="gate-field" id="mebAjandaBox" hidden>
        <span>MEB Ajanda kodu (6 hane, veli/ilköğretim)</span>
        <input id="mebAjandaCode" class="gate-input" inputmode="numeric" maxlength="6" />
      </label>
      <label class="gate-sub" style="display: flex; gap: 8px; align-items: center">
        <input type="checkbox" id="chkPortalImport" />
        CSV sonrası panele aktar
      </label>
      <div class="kb-actions">
        <button type="button" id="btnAll" class="btn-primary">Tüm sınıfları indir</button>
      </div>
      <p id="status" class="gate-message" role="status"></p>
      <ul id="classList" class="kb-list" hidden></ul>
    </main>
    <script src="../shared/brand-names.js"></script>
    <script src="../shared/messaging.js"></script>
    <script src="../shared/menu-kurum.js"></script>
    <script src="ogrenci-dosya.js"></script>
  </body>
</html>
