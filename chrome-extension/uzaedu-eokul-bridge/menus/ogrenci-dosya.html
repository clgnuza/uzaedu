<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <title>Öğrenci dosya — Uzaedu Okul Köprüsü</title>
    <link rel="stylesheet" href="kelebek.css" />
    <link rel="stylesheet" href="../shared/embed.css" />
  </head>
  <body
    class="uza-body"
    data-uza-platform="eokul"
    data-uza-icon="file"
    data-uza-title="Öğrenci dosyası"
    data-uza-lead="Grup ve alan seçerek CSV/ZIP indirir; isteğe bağlı panele aktarır."
  >
    <main class="card uza-page">
      <label class="uza-field">
        <span class="uza-field__label">Grup</span>
        <select id="groupId" class="gate-input uza-select"></select>
      </label>

      <div id="fieldBox" class="uza-field" hidden>
        <div class="uza-field__head">
          <span class="uza-field__label">Alanlar</span>
          <div class="uza-field__tools">
            <button type="button" id="btnFieldsAll" class="uza-text-btn">Tümünü seç</button>
            <span class="uza-field__sep" aria-hidden="true">·</span>
            <button type="button" id="btnFieldsNone" class="uza-text-btn">Temizle</button>
          </div>
        </div>
        <div id="fieldList" class="uza-chip-grid" role="group" aria-label="Dışa aktarılacak alanlar"></div>
      </div>

      <label class="uza-field" id="mebAjandaBox" hidden>
        <span class="uza-field__label">MEB Ajanda kodu</span>
        <span class="uza-field__hint">6 hane — veli / ilköğretim</span>
        <input id="mebAjandaCode" class="gate-input" inputmode="numeric" maxlength="6" placeholder="000000" />
      </label>

      <label class="uza-option-card">
        <input type="checkbox" id="chkPortalImport" class="uza-option-card__input" />
        <span class="uza-option-card__box" aria-hidden="true"></span>
        <span class="uza-option-card__text">
          <strong>CSV sonrası panele aktar</strong>
          <small>İndirilen dosyayı Uzaedu paneline yükler</small>
        </span>
      </label>

      <div class="uza-actions">
        <button type="button" id="btnAll" class="btn-primary btn-with-icon uza-btn-hero">
          <span class="btn-with-icon__ic" id="btnAllIcon" aria-hidden="true"></span>
          <span>Tüm sınıfları indir</span>
        </button>
      </div>

      <p id="status" class="gate-message" role="status"></p>
      <ul id="classList" class="kb-list uza-class-list" hidden></ul>
    </main>

    <script src="../shared/brand-names.js"></script>
    <script src="../shared/embed.js"></script>
    <script src="../shared/icons.js"></script>
    <script src="../shared/notify.js"></script>
    <script src="../shared/menu-chrome.js"></script>
    <script src="../shared/messaging.js"></script>
    <script src="../shared/menu-kurum.js"></script>
    <script src="ogrenci-dosya.js"></script>
  </body>
</html>
