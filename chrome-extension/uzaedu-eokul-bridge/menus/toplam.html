<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <title>Toplam devamsızlık</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../gate/gate.css" />
    <link rel="stylesheet" href="kelebek.css" />
  </head>
  <body class="uza-body">
    <main class="card uza-page">
      <a href="../app/app.html" class="back-link">← Modüller</a>
      <h1>Toplam devamsızlık</h1>
      <p class="gate-sub">Öğrenci başına OGR02015 toplamları (yavaş; ilköğretim).</p>
      <label><input type="checkbox" id="useOzursuz" checked /> Özürsüz</label>
      <label><input type="checkbox" id="useOzurlu" /> Özürlü</label>
      <p class="gate-sub">Özürsüz min gün</p>
      <input id="ozMin" type="number" step="0.5" value="1" class="btn-primary" style="width: 100%" />
      <button type="button" id="btnAll" class="btn-primary" style="width: 100%; margin-top: 1rem">Tüm sınıflar</button>
      <p id="status" class="gate-message"></p>
    </main>
    <script src="../shared/brand-names.js"></script>
    <script src="../shared/messaging.js"></script>
    <script src="toplam.js"></script>
  </body>
</html>
