<!DOCTYPE html>
<html lang="tr">

  <body class="uza-body" data-uza-platform="eokul" data-uza-icon="parent" data-uza-title="Veli bilgisi" data-uza-lead="Veli alanlarını e-Okul’e yazar.">
    <main class="card uza-page">
      <header>
        <a href="../app/app.html" class="back-link">‹ Modüller</a>
        <h1>Veli bilgisi güncelle</h1>
        <p class="gate-sub">Veli rehberindeki cep numaralarını e-Okul’a yazar.</p>
      </header>
      <label class="gate-field">
        <span>MEB Ajanda (6 hane, ilköğretim/okul öncesi)</span>
        <input id="mebAjandaCode" class="gate-input" inputmode="numeric" maxlength="6" />
      </label>
      <button type="button" id="btnRun" class="btn-primary">Rehberden e-Okul’a yaz</button>
      <p id="status" class="gate-message" role="status"></p>
    </main>
