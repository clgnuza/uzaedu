<!DOCTYPE html>
<html lang="tr">
  <head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Özürsüz › özürlü</title>
    <link rel="stylesheet" href="kelebek.css" />
    <link rel="stylesheet" href="../shared/embed.css" />
  </head>
  <body class="uza-body" data-uza-platform="eokul" data-uza-icon="transfer" data-uza-title="Özürsüz › özürlü" data-uza-lead="Seçilen günleri özürlüye aktarır.">
    <main class="card uza-page-main">
      <a href="../app/app.html" class="back-link">‹ Modüller</a>
      <h1>Özürsüzden özürlüye</h1>
      <p class="gate-sub">IOG02012 listesinden seçilen günleri IOG02013’e özürlü kaydeder.</p>
      <label class="gate-sub" for="ogrNo">Okul numarası</label>
      <input id="ogrNo" class="uza-input uza-w-full uza-mb-05" />
      <button type="button" id="btnList" class="btn-primary uza-w-full uza-mb-075">
        Özürsüz listesini getir
      </button>
      <p id="studentInfo" class="gate-sub" hidden></p>
      <div id="rowBox" hidden>
        <label class="gate-sub">Aktarılacak günler</label>
        <ul id="rowList" class="kb-list"></ul>
      </div>
      <label class="gate-sub" for="nedeni">Özür nedeni (ddl)</label>
      <input id="nedeni" class="uza-input uza-w-full uza-mb-05" placeholder="örn. 1" />
      <label class="gate-sub" for="aciklama">Açıklama</label>
      <input id="aciklama" class="uza-input uza-w-full uza-mb-075" maxlength="29" />
      <button type="button" id="btnVeliPdf" class="btn-primary uza-w-full uza-mb-05" hidden>
        Veli izin dilekçesi PDF
      </button>
      <button type="button" id="btnAktar" class="btn-primary uza-w-full" disabled>
        Seçilenleri özürlüye aktar
      </button>
      <p id="status" class="gate-message"></p>
    </main>
  <script src="../shared/brand-names.js"></script>
  <script src="../shared/embed.js"></script>
  <script src="../shared/icons.js"></script>
  <script src="../shared/notify.js"></script>
  <script src="../shared/menu-chrome.js"></script>
<script src="../shared/messaging.js"></script>
    <script src="ozursuz-ozurlu.js"></script>
  </body>
</html>
