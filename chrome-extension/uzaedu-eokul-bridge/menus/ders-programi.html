<!DOCTYPE html>
<html lang="tr">
  <head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Ders programı</title>
    <link rel="stylesheet" href="kelebek.css" />
    <link rel="stylesheet" href="../shared/embed.css" />
  </head>
  <body class="uza-body" data-uza-platform="eokul" data-uza-icon="schedule" data-uza-title="Ders programı" data-uza-lead="Program içe/dışa aktarım.">
    <main class="card uza-page">
      <a href="../app/app.html" class="back-link">‹ Modüller</a>
      <h1>Ders programı</h1>
      <label class="gate-sub" for="ddStudio">Stüdyo</label>
      <select id="ddStudio" class="uza-input uza-w-full uza-mb-1"></select>

      <h2 class="uza-h2">Dışa aktar (› e-Okul)</h2>
      <p class="gate-sub">Yerleşmiş programı e-Okul formatında indirin.</p>
      <label class="gate-sub" for="ddProgram">Program</label>
      <select id="ddProgram" class="uza-input uza-w-full uza-mb-075"></select>
      <button type="button" id="btnDdExport" class="btn-primary uza-w-full uza-mb-05" disabled>
        e-Okul XLSX indir
      </button>
      <button type="button" id="btnDdUploadMeb" class="btn-primary uza-w-full uza-mb-125" disabled>
        XLSX › e-Okul’a yükle (deneysel)
      </button>

      <h2 class="uza-h2">İçe aktar (‹ e-Okul)</h2>
      <p class="gate-sub">e-Okul’ten indirdiğiniz dosyayı atamalara yükleyin.</p>
      <label class="gate-sub" for="ddFormat">Format</label>
      <select id="ddFormat" class="uza-input uza-w-full uza-mb-075">
        <option value="auto">Otomatik</option>
        <option value="xlsx">Tablo XLSX</option>
        <option value="grid_xlsx">Izgara XLSX</option>
        <option value="csv">CSV</option>
      </select>
      <input id="ddFile" type="file" accept=".xlsx,.xls,.csv" / class="uza-input uza-w-full uza-mb-075">
      <label class="gate-sub uza-flex-check">
        <input type="checkbox" id="ddReplace" />
        Mevcut atamaları sil (yerine yaz)
      </label>
      <label class="gate-sub uza-flex-check uza-mb-075">
        <input type="checkbox" id="ddElective" checked />
        Seçmeli satırlardan alt grup oluştur
      </label>
      <button type="button" id="btnDdImport" class="btn-primary uza-w-full" disabled>İçe aktar</button>
      <p id="status" class="gate-message"></p>
      <ul id="previewList" class="kb-list" hidden></ul>
    </main>
  <script src="../shared/brand-names.js"></script>
  <script src="../shared/embed.js"></script>
  <script src="../shared/icons.js"></script>
  <script src="../shared/notify.js"></script>
  <script src="../shared/menu-chrome.js"></script>
<script src="../shared/messaging.js"></script>
    <script src="ders-programi.js"></script>
  </body>
</html>
