# Production: SSH to server, pull main, run scripts/deploy/server-deploy.sh (build, pm2).
# Secrets: DEPLOY_SSH_HOST, DEPLOY_SSH_USER, DEPLOY_SSH_KEY
# If TCP probe fails: open port 22 on server firewall (GitHub runner IPs are dynamic).

name: Deploy production

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'web-admin/**'
      - 'scripts/deploy/**'
      - '.github/workflows/deploy-production.yml'

permissions:
  contents: read

concurrency:
  group: deploy-uzaedu-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Probe SSH port (TCP 22)
        shell: bash
        run: |
          set -euo pipefail
          H="${{ secrets.DEPLOY_SSH_HOST }}"
          if ! timeout 8 bash -c "echo >/dev/tcp/${H}/22"; then
            echo "::error::Port 22 not reachable from Actions runner. On server: sudo ufw allow 22/tcp && sudo ufw reload"
            exit 1
          fi
          echo "Port 22 reachable, continuing to SSH..."

      - name: Run server deploy script over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 20m
          script_stop: true
          debug: true
          script: |
            set -eux
            test -d /opt/uzaedu
            cd /opt/uzaedu
            git fetch origin main
            git pull --ff-only origin main
            export UZAEDU_SKIP_GIT_PULL=1
            bash scripts/deploy/server-deploy.sh