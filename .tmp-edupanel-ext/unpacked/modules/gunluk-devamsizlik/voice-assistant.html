<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=320"><title>Ses Asistanı - EduPanel</title><link rel="stylesheet" href="../../assets/vendor/font-awesome/css/all.min.css"><link rel="stylesheet" href="../../popup/styles/variables.css"><link rel="stylesheet" href="../../popup/styles/components.css"><style>body{width:300px;min-height:320px;background:var(--bg-secondary);margin:0;padding:0}.container{background:var(--bg-main);min-height:320px;display:flex;flex-direction:column}.module-header{background:linear-gradient(135deg,var(--primary-color) 0,var(--primary-hover) 100%);padding:.65rem .85rem;color:var(--text-light);display:flex;align-items:center;gap:.75rem}.module-header-icon{background:rgba(255,255,255,.2);width:2.25rem;height:2.25rem;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:var(--font-base);flex-shrink:0}.module-header-content{flex:1}.module-title{font-size:var(--font-sm);font-weight:var(--font-bold);margin-bottom:.1rem;display:flex;align-items:center;gap:.4rem}.module-subtitle{font-size:var(--font-xs);opacity:.9;margin:0}.content{padding:.85rem;flex:1;display:flex;flex-direction:column;align-items:center;gap:.75rem}.mic-section{display:flex;flex-direction:column;align-items:center;padding:.25rem 0}.wave-circle{position:relative;width:80px;height:80px;display:flex;align-items:center;justify-content:center;margin-bottom:.6rem}.wave{position:absolute;width:80px;height:80px;border-radius:50%;border:2px solid rgba(70,95,255,.3);opacity:0}.wave-circle.listening .wave{animation:wave-pulse 2s ease-out infinite}.wave-circle.listening .wave:first-child{animation-delay:0s}.wave-circle.listening .wave:nth-child(2){animation-delay:.5s}.wave-circle.listening .wave:nth-child(3){animation-delay:1s}@keyframes wave-pulse{0%{transform:scale(.6);opacity:1}100%{transform:scale(1.8);opacity:0}}.mic-button{position:relative;width:52px;height:52px;border-radius:50%;border:none;background:var(--primary-color);color:var(--text-light);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:var(--font-xl);transition:all var(--transition-base);box-shadow:var(--shadow-primary);z-index:10}.mic-button:hover{transform:scale(1.08);background:var(--primary-hover);box-shadow:0 6px 20px 0 rgba(70,95,255,.3)}.mic-button:active{transform:scale(.95)}.mic-button.listening{background:var(--error-color);box-shadow:0 4px 14px 0 rgba(239,68,68,.4)}.mic-button.listening i{animation:pulse-icon 1s ease-in-out infinite}@keyframes pulse-icon{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}.status-text{font-size:var(--font-sm);color:var(--text-secondary);font-weight:var(--font-medium);text-align:center;min-height:1.25rem}.text-display{width:100%}.text-box{background:var(--bg-secondary);border:2px solid var(--border-light);border-radius:var(--radius-lg);padding:.35rem .65rem;height:30px;font-size:var(--font-xs);color:var(--text-secondary);text-align:center;transition:all var(--transition-base);display:flex;align-items:center;justify-content:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.text-box.active{border-color:var(--primary-color);background:var(--primary-bg)}.text-box .placeholder{color:var(--text-tertiary);font-style:italic}.text-box strong{color:var(--primary-color);font-weight:var(--font-semibold);text-transform:uppercase}.text-box .interim{text-transform:uppercase}.footer{padding:0 .85rem .85rem}.btn-close-assistant{width:100%;padding:.55rem;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border-light);border-radius:var(--radius-md);cursor:pointer;font-weight:var(--font-semibold);font-size:var(--font-xs);transition:all var(--transition-base);display:flex;align-items:center;justify-content:center;gap:.4rem;font-family:inherit}.btn-close-assistant:hover{background:var(--border-medium);transform:translateY(-1px);box-shadow:var(--shadow-sm)}.btn-close-assistant:active{transform:translateY(0)}.helper-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .5rem;border-radius:var(--radius-full);font-size:10px;font-weight:var(--font-medium);background:var(--primary-bg);color:var(--primary-color)}</style></head><body><div class="container"><div class="module-header"><div class="module-header-icon"><i class="fas fa-microphone"></i></div><div class="module-header-content"><div class="module-title">Ses Asistanı</div><p class="module-subtitle">Sesli devamsızlık girişi</p></div></div><div class="content"><div class="mic-section"><div class="wave-circle" id="waveCircle"><div class="wave"></div><div class="wave"></div><div class="wave"></div><button class="mic-button" id="micButton" title="Mikrofon"><i class="fas fa-microphone"></i></button></div><div class="status-text" id="statusText">Hazırlanıyor...</div></div><div class="text-display"><div class="text-box" id="textBox"><span class="placeholder">Konuşmaya başladığınızda metin burada görünecektir.</span></div></div><div class="helper-badge"><i class="fas fa-info-circle"></i> Örn: "150 sabah" veya sadece "23"</div></div><div class="footer"><button class="btn-close-assistant" id="btnClose"><i class="fas fa-stop-circle"></i> Durdur ve Kapat</button></div></div><script src="voice-assistant.js"></script></body></html>
