# /etc/nginx/sites-available/uzaedu -> sites-enabled
# SSL: certbot ile tek sertifika (aşağıdaki yollar certbot çıktısına göre güncellenir)
#   certbot certonly --nginx -d uzaedu.com -d www.uzaedu.com -d admin.uzaedu.com -d api.uzaedu.com
# Sertifika dizini genelde: /etc/letsencrypt/live/uzaedu.com/

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# ---- HTTP -> HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name admin.uzaedu.com;
    return 301 https://uzaedu.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.uzaedu.com;
    return 301 https://api.uzaedu.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name uzaedu.com www.uzaedu.com;
    return 301 https://$host$request_uri;
}

# ---- HTTPS: kök + www -> aynı Next (landing /); admin.uzaedu.com ayrı server_name ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name uzaedu.com www.uzaedu.com;

    ssl_certificate /etc/letsencrypt/live/uzaedu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uzaedu.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 25m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    proxy_buffering on;
    proxy_buffer_size 128k;
    proxy_buffers 8 128k;
    proxy_busy_buffers_size 256k;

    location ^~ /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~* ^/(favicon\.ico|.*\.(?:css|js|mjs|map|png|jpg|jpeg|gif|svg|webp|ico|woff2?|ttf|otf))$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Firebase Google popup: window.close / COOP — katı başlık popup’ı kırar
        proxy_hide_header Cross-Origin-Opener-Policy;
        add_header Cross-Origin-Opener-Policy "unsafe-none" always;
    }
}

# ---- HTTPS: admin host → kök alan adı (panel tek origin: uzaedu.com) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.uzaedu.com;

    ssl_certificate /etc/letsencrypt/live/uzaedu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uzaedu.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    return 301 https://uzaedu.com$request_uri;
}

# ---- HTTPS: API (Nest / PM2 :4000) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.uzaedu.com;

    ssl_certificate /etc/letsencrypt/live/uzaedu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uzaedu.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 25m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    proxy_buffering on;
    proxy_buffer_size 128k;
    proxy_buffers 8 128k;
    proxy_busy_buffers_size 256k;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
