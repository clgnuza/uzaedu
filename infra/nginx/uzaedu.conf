# /etc/nginx/sites-available/uzaedu -> sites-enabled
# SSL: certbot ile tek sertifika (aşağıdaki yollar certbot çıktısına göre güncellenir)
#   certbot certonly --nginx -d uzaedu.com -d www.uzaedu.com -d admin.uzaedu.com -d api.uzaedu.com
# Sertifika dizini genelde: /etc/letsencrypt/live/uzaedu.com/

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# ---- HTTP -> HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name admin.uzaedu.com;
    return 301 https://admin.uzaedu.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.uzaedu.com;
    return 301 https://api.uzaedu.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name uzaedu.com www.uzaedu.com;
    return 301 https://admin.uzaedu.com$request_uri;
}

# ---- HTTPS: kök + www -> admin panel ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name uzaedu.com www.uzaedu.com;

    ssl_certificate /etc/letsencrypt/live/uzaedu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uzaedu.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    return 301 https://admin.uzaedu.com$request_uri;
}

# ---- HTTPS: web-admin (Next.js / PM2 :3000) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.uzaedu.com;

    ssl_certificate /etc/letsencrypt/live/uzaedu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uzaedu.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- HTTPS: API (Nest / PM2 :4000) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.uzaedu.com;

    ssl_certificate /etc/letsencrypt/live/uzaedu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uzaedu.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
